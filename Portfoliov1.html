<!doctype html>
<html lang="pt-BR" data-theme="rosa">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ana caroline vieira · carollie.dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Helvetica";
        src: url("./assets/fonts/Helvetica.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Helvetica";
        src: url("./assets/fonts/Helvetica-Bold.ttf") format("truetype");
        font-weight: 600 700;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Helvetica";
        src: url("./assets/fonts/Helvetica-Oblique.ttf") format("truetype");
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }

      @font-face {
        font-family: "Helvetica";
        src: url("./assets/fonts/Helvetica-BoldOblique.ttf") format("truetype");
        font-weight: 600 700;
        font-style: italic;
        font-display: swap;
      }
      /* ============ THEME TOKENS ============ */
      :root,
      :root[data-theme="rosa"] {
        --bg: #0b0608;
        --bg2: #120a0e;
        --panel: #190d12;
        --dither-bg: #0b0608;
        --ink: #f1e0e6;
        --muted: #9a7c84;
        --accent: #ef9bb6;
        --accent-bright: #ff8fb4;
        --accent-deep: #a8536f;
        --soft: rgba(239, 155, 182, 0.1);
        --line: rgba(239, 155, 182, 0.16);
      }
      :root[data-theme="wired"] {
        --bg: #060a0a;
        --bg2: #0a1112;
        --panel: #0c1517;
        --dither-bg: #060a0a;
        --ink: #dceeec;
        --muted: #6f928d;
        --accent: #86e5d8;
        --accent-bright: #b3fff2;
        --accent-deep: #3f8f86;
        --soft: rgba(134, 229, 216, 0.09);
        --line: rgba(134, 229, 216, 0.16);
      }
      :root[data-theme="amber"] {
        --bg: #0b0805;
        --bg2: #120d07;
        --panel: #19120a;
        --dither-bg: #0b0805;
        --ink: #f3e6d2;
        --muted: #9c8460;
        --accent: #f0b86a;
        --accent-bright: #ffce8a;
        --accent-deep: #a87838;
        --soft: rgba(240, 184, 106, 0.09);
        --line: rgba(240, 184, 106, 0.16);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: "Helvetica", Helvetica, sans-serif;
        font-size: 19px;
        line-height: 1.62;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        transition:
          background 0.5s ease,
          color 0.5s ease;
      }

      .mono {
        font-family: "Space Mono", monospace;
      }
      .muted {
        color: var(--muted);
      }
      em {
        font-style: italic;
        color: var(--accent);
      }
      strong {
        font-weight: 500;
        color: var(--ink);
      }

      .wrap {
        width: min(1080px, 90vw);
        margin: 0 auto;
      }

      .dither {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      /* ============ BOOT ============ */
      .boot {
        position: fixed;
        inset: 0;
        z-index: 9000;
        background: var(--bg);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 0 max(8vw, 28px);
        cursor: pointer;
        transition: opacity 0.6s ease;
      }
      .boot--out {
        opacity: 0;
      }
      .boot__inner {
        font-family: "Space Mono", monospace;
        font-size: 15px;
        line-height: 2.1;
        color: var(--accent);
      }
      .boot__line {
        white-space: pre-wrap;
        animation: bootIn 0.3s ease both;
        text-shadow: 0 0 14px var(--soft);
      }
      @keyframes bootIn {
        from {
          opacity: 0;
          transform: translateX(-6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .boot__caret {
        display: inline-block;
        color: var(--accent-bright);
        animation: blink 0.9s steps(1) infinite;
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }
      .boot__skip {
        position: absolute;
        bottom: 7vh;
        left: max(8vw, 28px);
        color: var(--muted);
        font-size: 12px;
      }

      /* ============ APP entrance ============ */
      .app {
        opacity: 1;
      }

      /* ============ CRT / SCANLINES ============ */
      .crt {
        position: fixed;
        inset: 0;
        z-index: 8000;
        pointer-events: none;
        mix-blend-mode: screen;
      }
      .crt::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.035) 0px,
          rgba(255, 255, 255, 0.035) 1px,
          transparent 1px,
          transparent 3px
        );
      }
      .crt::after {
        content: "";
        position: absolute;
        inset: 0;
        mix-blend-mode: multiply;
        background: radial-gradient(
          120% 90% at 50% 45%,
          transparent 55%,
          rgba(0, 0, 0, 0.55) 100%
        );
        animation: flicker 6s infinite;
      }
      @keyframes flicker {
        0%,
        100% {
          opacity: 0.85;
        }
        47% {
          opacity: 0.9;
        }
        48% {
          opacity: 0.7;
        }
        49% {
          opacity: 0.92;
        }
      }

      /* ============ THEME SWITCH ============ */
      .themeswitch {
        position: fixed;
        top: 18px;
        right: 18px;
        z-index: 8500;
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 11px;
        color: var(--muted);
        background: color-mix(in srgb, var(--bg) 80%, transparent);
        backdrop-filter: blur(6px);
        border: 1px solid var(--line);
        padding: 7px 11px;
        border-radius: 2px;
      }
      .themeswitch__lbl {
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .themeswitch__dots {
        display: flex;
        gap: 7px;
      }
      .themeswitch__dot {
        position: relative;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        border: 1px solid var(--line);
        background: transparent;
        cursor: pointer;
        padding: 0;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }
      .themeswitch__dot::after {
        content: "";
        position: absolute;
        inset: 3px;
        border-radius: 50%;
      }
      .tw--rosa::after {
        background: #ef9bb6;
      }
      .tw--wired::after {
        background: #86e5d8;
      }
      .tw--amber::after {
        background: #f0b86a;
      }
      .themeswitch__dot:hover {
        transform: scale(1.18);
      }
      .themeswitch__dot.is-on {
        box-shadow:
          0 0 0 1px var(--accent),
          0 0 12px var(--soft);
      }
      .themeswitch__name {
        position: absolute;
        top: 130%;
        left: 50%;
        transform: translateX(-50%);
        font-size: 9px;
        opacity: 0;
        white-space: nowrap;
        transition: opacity 0.2s;
        color: var(--accent);
      }
      .themeswitch__dot:hover .themeswitch__name {
        opacity: 1;
      }

      /* ============ REVEAL ============ */
      .reveal {
        opacity: 0;
        transform: translateY(18px);
        transition:
          opacity 0.7s ease,
          transform 0.7s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .reveal.in {
        opacity: 1;
        transform: none;
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal {
          opacity: 1;
          transform: none;
        }
      }

      /* ============ HERO ============ */
      .hero {
        position: relative;
      }
      .hero__banner {
        position: relative;
        width: 100%;
        height: 300px;
        overflow: hidden;
        border-bottom: 1px solid var(--line);
      }
      .hero__banner .dither {
        height: 100%;
        object-fit: cover;
      }
      .hero__bannerglow {
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%);
      }

      .hero__body {
        position: relative;
        margin-top: -64px;
        padding-bottom: 40px;
      }
      .hero__avatar {
        width: 116px;
        height: 116px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid var(--accent);
        box-shadow: 0 0 30px var(--soft);
        position: relative;
        z-index: 2;
        background: var(--bg);
      }
      .hero__name {
        font-family: "Helvetica", Helvetica, sans-serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(42px, 8vw, 88px);
        line-height: 1;
        letter-spacing: -0.01em;
        margin: 22px 0 6px;
        color: var(--ink);
      }
      .hero__role {
        font-size: 13px;
        letter-spacing: 0.08em;
        color: var(--accent);
        text-transform: lowercase;
      }
      .hero__role .dot {
        color: var(--muted);
        margin: 0 8px;
      }

      .hero__quote {
        margin-top: 26px;
        padding-left: 18px;
        border-left: 2px solid var(--accent-deep);
        font-style: italic;
        color: var(--muted);
        font-size: 18px;
        max-width: 640px;
      }

      /* ============ CALLOUT (notion-style) ============ */
      .callout {
        display: flex;
        gap: 14px;
        align-items: flex-start;
        background: var(--soft);
        border: 1px solid var(--line);
        border-radius: 3px;
        padding: 18px 20px;
        margin-top: 26px;
        max-width: 760px;
      }
      .callout__bullet {
        color: var(--accent);
        font-size: 18px;
        line-height: 1.4;
      }
      .callout p {
        font-size: 18px;
      }

      /* ============ SECTIONS ============ */
      .sec {
        padding: 64px 0;
      }
      .bar {
        display: flex;
        align-items: baseline;
        gap: 16px;
        background: linear-gradient(90deg, var(--soft), transparent 80%);
        border-left: 3px solid var(--accent);
        padding: 12px 18px;
        margin-bottom: 34px;
      }
      .bar__n {
        font-size: 12px;
        color: var(--accent-deep);
      }
      .bar__t {
        font-family: "Helvetica", Helvetica, sans-serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(28px, 4vw, 40px);
        color: var(--accent);
      }

      /* ============ ABOUT ============ */
      .about {
        display: grid;
        grid-template-columns: 1.6fr 1fr;
        gap: 44px;
        align-items: start;
      }
      .about__text p {
        margin-bottom: 16px;
      }
      .about__side {
        display: flex;
        flex-direction: column;
        gap: 26px;
      }
      .remember {
        border: 1px solid var(--line);
        border-radius: 3px;
        padding: 18px 20px;
        background: var(--bg2);
      }
      .remember__t {
        font-family: "Helvetica", Helvetica, sans-serif;
        font-style: italic;
        font-weight: 600;
        font-size: 24px;
        color: var(--accent);
        margin-bottom: 12px;
      }
      .remember__list {
        list-style: none;
        font-size: 13px;
        line-height: 2;
        color: var(--ink);
      }
      .remember__list li {
        color: var(--muted);
      }
      .stack__lbl {
        display: block;
        font-size: 11px;
        letter-spacing: 0.12em;
        color: var(--accent-deep);
        margin-bottom: 12px;
        text-transform: uppercase;
      }
      .stack__chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .chip {
        font-size: 11px;
        padding: 5px 10px;
        border: 1px solid var(--line);
        border-radius: 2px;
        color: var(--ink);
        background: var(--soft);
        transition:
          border-color 0.2s,
          color 0.2s,
          transform 0.2s;
      }
      .chip:hover {
        border-color: var(--accent);
        color: var(--accent-bright);
        transform: translateY(-1px);
      }

      /* ============ PROJECTS GRID ============ */
      .grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 22px;
      }
      .card {
        text-align: left;
        cursor: pointer;
        font-family: inherit;
        color: inherit;
        background: var(--bg2);
        border: 1px solid var(--line);
        border-radius: 4px;
        overflow: hidden;
        padding: 0;
        display: flex;
        flex-direction: column;
        transition:
          border-color 0.25s,
          transform 0.25s,
          box-shadow 0.25s;
      }
      .card:hover {
        border-color: var(--accent);
        transform: translateY(-3px);
        box-shadow: 0 14px 40px -20px var(--accent-deep);
      }
      .card__cover {
        position: relative;
        height: 168px;
        overflow: hidden;
        border-bottom: 1px solid var(--line);
      }
      .card__cover .dither {
        height: 100%;
        transition: transform 0.5s ease;
      }
      .card:hover .card__cover .dither {
        transform: scale(1.06);
      }
      .card__kind {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 10px;
        letter-spacing: 0.08em;
        background: color-mix(in srgb, var(--bg) 78%, transparent);
        color: var(--accent);
        padding: 4px 8px;
        border: 1px solid var(--line);
        border-radius: 2px;
      }
      .card__body {
        padding: 18px 20px 20px;
      }
      .card__name {
        font-family: "Helvetica", Helvetica, sans-serif;
        font-style: italic;
        font-weight: 600;
        font-size: 30px;
        color: var(--ink);
        margin-bottom: 6px;
      }
      .card__tag {
        color: var(--muted);
        font-size: 17px;
        margin-bottom: 14px;
      }
      .card__open {
        font-size: 11px;
        color: var(--accent);
        letter-spacing: 0.06em;
      }

      /* ============ MODAL ============ */
      .modal {
        position: fixed;
        inset: 0;
        z-index: 9500;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(4, 2, 3, 0.78);
        backdrop-filter: blur(4px);
        padding: 24px;
        animation: fade 0.25s ease;
      }
      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      .modal__card {
        width: min(640px, 100%);
        max-height: 90vh;
        overflow-y: auto;
        background: var(--panel);
        border: 1px solid var(--accent);
        border-radius: 5px;
        box-shadow: 0 30px 90px -30px var(--accent-deep);
        animation: pop 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      }
      @keyframes pop {
        from {
          opacity: 0;
          transform: translateY(20px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .modal__cover {
        position: relative;
        height: 200px;
        overflow: hidden;
        border-bottom: 1px solid var(--line);
      }
      .modal__cover .dither {
        height: 100%;
      }
      .modal__x {
        position: absolute;
        top: 12px;
        right: 12px;
        font-size: 11px;
        cursor: pointer;
        background: color-mix(in srgb, var(--bg) 78%, transparent);
        color: var(--accent);
        border: 1px solid var(--line);
        padding: 5px 9px;
        border-radius: 2px;
      }
      .modal__x:hover {
        border-color: var(--accent);
        color: var(--accent-bright);
      }
      .modal__kind {
        position: absolute;
        bottom: 12px;
        left: 14px;
        font-size: 10px;
        letter-spacing: 0.08em;
        color: var(--accent);
        background: color-mix(in srgb, var(--bg) 78%, transparent);
        padding: 4px 8px;
        border: 1px solid var(--line);
      }
      .modal__body {
        padding: 24px 26px 28px;
      }
      .modal__name {
        font-family: "Helvetica", Helvetica, sans-serif;
        font-style: italic;
        font-weight: 600;
        font-size: 44px;
        color: var(--ink);
      }
      .modal__tag {
        color: var(--accent);
        font-style: italic;
        font-size: 19px;
        margin: 4px 0 16px;
      }
      .modal__desc {
        color: var(--ink);
        margin-bottom: 22px;
      }
      .modal__meta {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        margin-bottom: 24px;
      }
      .metalbl {
        display: block;
        font-size: 10px;
        letter-spacing: 0.14em;
        color: var(--accent-deep);
        text-transform: uppercase;
        margin-bottom: 10px;
      }
      .modal__status {
        font-size: 13px;
        color: var(--accent);
      }
      .btn {
        display: inline-block;
        font-size: 12px;
        letter-spacing: 0.08em;
        color: var(--bg);
        background: var(--accent);
        padding: 11px 20px;
        border-radius: 2px;
        text-decoration: none;
        transition:
          background 0.2s,
          transform 0.2s;
      }
      .btn:hover {
        background: var(--accent-bright);
        transform: translateY(-1px);
      }

      /* ============ CONTACT ============ */
      .links {
        display: grid;
        gap: 0;
        margin-top: 26px;
        border-top: 1px solid var(--line);
      }
      .link {
        display: grid;
        grid-template-columns: 140px 1fr auto;
        align-items: center;
        gap: 18px;
        padding: 20px 8px;
        border-bottom: 1px solid var(--line);
        text-decoration: none;
        color: var(--ink);
        transition:
          background 0.2s,
          padding 0.2s;
      }
      .link:hover {
        background: var(--soft);
        padding-left: 18px;
      }
      .link__lbl {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent-deep);
      }
      .link__val {
        font-family: "Helvetica", Helvetica, sans-serif;
        font-style: italic;
        font-size: 26px;
        color: var(--ink);
      }
      .link:hover .link__val {
        color: var(--accent-bright);
      }
      .link__arrow {
        font-size: 16px;
        color: var(--accent);
      }

      /* ============ FOOTER ============ */
      .footer {
        display: flex;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 10px;
        font-size: 11px;
        color: var(--muted);
        padding: 40px 0 60px;
        letter-spacing: 0.06em;
      }

      /* ============ GLITCH ============ */
      .glitch {
        position: relative;
      }
      .glitch::before,
      .glitch::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        clip-path: inset(0 0 0 0);
        opacity: 0;
        pointer-events: none;
      }
      .glitch:hover::before {
        opacity: 0.85;
        color: var(--accent-bright);
        animation: gl1 0.4s steps(2) infinite;
        left: 2px;
      }
      .glitch:hover::after {
        opacity: 0.7;
        color: var(--accent-deep);
        animation: gl2 0.4s steps(2) infinite;
        left: -2px;
      }
      @keyframes gl1 {
        0% {
          clip-path: inset(0 0 70% 0);
        }
        50% {
          clip-path: inset(40% 0 20% 0);
        }
        100% {
          clip-path: inset(60% 0 0 0);
        }
      }
      @keyframes gl2 {
        0% {
          clip-path: inset(70% 0 0 0);
        }
        50% {
          clip-path: inset(20% 0 50% 0);
        }
        100% {
          clip-path: inset(0 0 80% 0);
        }
      }

      /* ============ RESPONSIVE ============ */
      @media (max-width: 760px) {
        body {
          font-size: 17px;
        }
        .about {
          grid-template-columns: 1fr;
          gap: 30px;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .link {
          grid-template-columns: 1fr auto;
        }
        .link__lbl {
          display: none;
        }
        .hero__banner {
          height: 220px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>

    <script src="dither.js"></script>
    <script type="text/babel" src="components.jsx"></script>
    <script type="text/babel" src="app.jsx"></script>
  </body>
</html>
