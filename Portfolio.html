<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ana caroline vieira · carollie.dev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <style>
      @font-face {
        font-family: "Helvetica";
        src: url("./assets/fonts/Helvetica.ttf") format("truetype");
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Helvetica";
        src: url("./assets/fonts/Helvetica-Bold.ttf") format("truetype");
        font-weight: 600 700;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "Helvetica";
        src: url("./assets/fonts/Helvetica-Oblique.ttf") format("truetype");
        font-weight: 400;
        font-style: italic;
        font-display: swap;
      }

      @font-face {
        font-family: "Helvetica";
        src: url("./assets/fonts/Helvetica-BoldOblique.ttf") format("truetype");
        font-weight: 600 700;
        font-style: italic;
        font-display: swap;
      }
      /* ============ COLOR TOKENS ============ */
      :root {
        --mx: 50vw;
        --my: 50vh;
        --bg: #0b0608;
        --bg2: #120a0e;
        --panel: #190d12;
        --dither-bg: #0b0608;
        --ink: #f1e0e6;
        --muted: #9a7c84;
        --accent: #ef9bb6;
        --accent-bright: #ff8fb4;
        --accent-deep: #a8536f;
        --soft: rgba(239, 155, 182, 0.1);
        --line: rgba(239, 155, 182, 0.18);
        --grid: rgba(239, 155, 182, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html {
        scroll-behavior: smooth;
      }
      body {
        background:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px),
          var(--bg);
        background-size: 22px 22px;
        color: var(--ink);
        font-family: "Helvetica", Helvetica, sans-serif;
        font-size: 19px;
        line-height: 1.62;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      body.has-cursor,
      body.has-cursor * {
        cursor: none !important;
      }
      .crt-type {
        font-family: "Space Mono", monospace;
        letter-spacing: 0.02em;
      }
      .muted {
        color: var(--muted);
      }
      em {
        font-style: normal;
        color: var(--accent);
        font-family: "Space Mono", monospace;
        font-weight: 700;
      }
      strong {
        font-weight: 700;
        color: var(--ink);
      }
      a {
        color: inherit;
        text-decoration: none;
      }
      .wrap {
        width: min(1180px, 88vw);
        margin: 0 auto;
      }
      .dither {
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }
      .blink {
        animation: blink 1s steps(1) infinite;
        color: var(--accent);
      }
      @keyframes blink {
        50% {
          opacity: 0;
        }
      }

      /* ============ CURSOR ============ */
      .cursor-dot,
      .cursor-ring {
        position: fixed;
        top: 0;
        left: 0;
        z-index: 9999;
        pointer-events: none;
      }
      .cursor-dot {
        width: 8px;
        height: 8px;
        margin: -4px 0 0 -4px;
        background: var(--ink);
        box-shadow:
          0 0 0 2px var(--bg),
          0 0 16px var(--accent-bright);
      }
      .cursor-ring__b {
        position: absolute;
        transform: translate(-50%, -50%);
        width: 26px;
        height: 26px;
        border: 1px solid var(--ink);
        background: rgba(11, 6, 8, 0.18);
        transition:
          width 0.18s,
          height 0.18s,
          background 0.18s,
          border-color 0.18s;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .cursor-ring__b.cursor--link {
        width: 42px;
        height: 42px;
        border-color: var(--ink);
      }
      .cursor-ring__b.cursor--view {
        width: 76px;
        height: 76px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--bg) 44%, transparent);
        border-color: var(--ink);
      }
      .cursor-label {
        font-size: 13px;
        color: var(--accent-bright);
      }

      /* ============ BOOT ============ */
      .boot {
        position: fixed;
        inset: 0;
        z-index: 9000;
        background: var(--ink);
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        justify-content: center;
        padding: 0 max(8vw, 28px);
        transition: opacity 0.55s ease;
        overflow: hidden;
      }
      .boot--out {
        opacity: 0;
      }
      .boot__scan {
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.04) 0 1px,
          transparent 1px 3px
        );
        pointer-events: none;
      }
      .boot__inner {
        font-size: 22px;
        line-height: 1.7;
        color: var(--accent);
        position: relative;
        z-index: 1;
        text-shadow: 0 0 18px var(--soft);
      }
      .boot__line {
        white-space: pre-wrap;
        animation: bootIn 0.25s ease both;
      }
      @keyframes bootIn {
        from {
          opacity: 0;
          transform: translateX(-6px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .boot__caret {
        color: var(--accent-bright);
        animation: blink 0.8s steps(1) infinite;
        font-size: 22px;
      }
      .boot__skip {
        position: absolute;
        bottom: 7vh;
        left: max(8vw, 28px);
        color: var(--muted);
        font-size: 18px;
      }

      /* ============ CRT OVERLAY ============ */
      .crt {
        position: fixed;
        inset: 0;
        z-index: 8000;
        pointer-events: none;
        mix-blend-mode: multiply;
        opacity: 0.25;
      }
      .crt::before {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          rgba(255, 255, 255, 0.03) 0 1px,
          transparent 1px 3px
        );
      }
      .crt::after {
        content: "";
        position: absolute;
        inset: 0;
        mix-blend-mode: multiply;
        background: transparent;
        animation: flicker 7s infinite;
      }
      @keyframes flicker {
        0%,
        100% {
          opacity: 0.86;
        }
        47% {
          opacity: 0.9;
        }
        48% {
          opacity: 0.72;
        }
        49% {
          opacity: 0.92;
        }
      }

      /* ============ NAV ============ */
      .nav {
        display: flex;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 7000;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 14px max(4vw, 18px);
        background: color-mix(in srgb, var(--bg) 86%, transparent);
        backdrop-filter: blur(8px);
        border-bottom: 2px solid var(--ink);
        font-size: 13px;
        text-transform: lowercase;
      }
      .nav__brand {
        background: none;
        border: none;
        color: var(--ink);
        font-family: "Space Mono", monospace;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
      }
      .nav__brandmark {
        color: var(--accent);
      }
      .nav__links {
        display: flex;
        gap: 4px;
      }
      .nav__link {
        background: none;
        border: none;
        color: var(--muted);
        font-family: "Space Mono", monospace;
        font-size: 12px;
        padding: 5px 10px;
        cursor: pointer;
        position: relative;
        transition: color 0.2s;
      }
      .nav__link:hover {
        color: var(--ink);
      }
      .nav__link.is-active {
        color: var(--ink);
        background: var(--accent);
      }
      .nav__link.is-active::after {
        content: "";
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 0;
        display: none;
      }

      /* ============ REVEAL ============ */
      .reveal {
        opacity: 0;
        transform: translateY(20px);
        transition:
          opacity 0.7s ease,
          transform 0.7s cubic-bezier(0.2, 0.7, 0.2, 1);
      }
      .reveal.in {
        opacity: 1;
        transform: none;
      }
      @media (prefers-reduced-motion: reduce) {
        .reveal {
          opacity: 1;
          transform: none;
        }
      }

      /* ============ HERO ============ */
      .hero {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 82px 0 76px;
        isolation: isolate;
        background:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px),
          var(--bg);
        background-size: 22px 22px;
      }
      .hero::before {
        content: none;
      }
      .hero__bg {
        position: absolute;
        inset: 0;
        z-index: -1;
      }
      .hero__bgveil {
        position: absolute;
        inset: 0;
        background: transparent;
      }
      .hero__grid {
        position: relative;
        z-index: 2;
        display: grid;
        grid-template-columns: 1fr;
        align-items: center;
        color: var(--ink);
        box-shadow: none;
      }
      .hero__miniNav {
        position: absolute;
        top: 24px;
        left: 30px;
        right: 30px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        color: var(--ink);
        font-size: 12px;
        z-index: 3;
      }
      .hero__miniNav span:first-child {
        font-size: 17px;
        font-weight: 700;
      }
      .hero__tech {
        position: absolute;
        z-index: 1;
        border: 1px solid var(--line);
        background: rgba(11, 6, 8, 0.72);
        color: var(--accent-bright);
        padding: 8px 10px;
        font-size: 12px;
        box-shadow: 6px 6px 0 rgba(168, 83, 111, 0.28);
      }
      .hero__tech--1 {
        left: 10%;
        top: 45%;
      }
      .hero__tech--2 {
        right: -10%;
        top: 32%;
      }
      .hero__tech--3 {
        left: 0%;
        bottom: 18%;
      }
      .hero__left {
        display: flex;
        min-height: 0;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        z-index: 2;
      }
      .hero__tag {
        height: 22px;
        font-size: 0;
        color: var(--ink);
        margin-bottom: 12px;
        text-transform: uppercase;
        letter-spacing: 0;
      }
      .hero__tag::before {
        content: "digital solutions & software development";
        font-size: 12px;
        font-family: "Space Mono", monospace;
      }
      .hero__name {
        font-family: "Space Mono", monospace;
        font-style: normal;
        font-weight: 700;
        line-height: 0.82;
        margin-bottom: 18px;
        text-transform: uppercase;
        max-width: min(1080px, 72vw);
      }
      .hero__nameline {
        display: block;
        font-size: clamp(70px, 13.2vw, 190px);
        color: var(--ink);
      }
      .hero__nameline--2 {
        color: rgba(239, 155, 182, 0.36);
        margin-left: 0;
      }
      .hero__role {
        font-size: 0;
        color: var(--ink);
        margin-bottom: 22px;
        text-transform: uppercase;
      }
      .hero__role::before {
        content: "success is your reality";
        font-size: clamp(22px, 2.8vw, 36px);
        font-family: "Helvetica", Helvetica, sans-serif;
        font-weight: 700;
      }
      .hero__role .tw-caret {
        display: none;
      }
      .hero__lead {
        font-size: 14px;
        max-width: 520px;
        color: var(--ink);
        margin-bottom: 28px;
        text-transform: uppercase;
        line-height: 1.45;
      }
      .hero__cta {
        display: flex;
        align-items: center;
        gap: 22px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .hero__cta .magnetic:not(:first-child),
      .hero__cta .social {
        display: none;
      }
      .hero__start {
        background: var(--accent-bright);
        color: var(--ink);
        border: 0;
        font-size: 18px;
        padding: 12px 28px;
      }
      .hero__aside {
        position: absolute;
        right: clamp(20px, 12vw, 20px);
        bottom: clamp(-28px, 15vh, -25px);
        width: min(260px, 22vw);
        display: flex;
        flex-direction: column;
        gap: 18px;
        border-left: 0;
        padding-left: 0;
        font-size: 11px;
        line-height: 1.5;
        text-transform: uppercase;
        color: var(--ink);
        z-index: 3;
        text-align: left;
      }
      .hero__asidek {
        color: var(--ink);
        font-size: 11px;
        font-weight: 700;
      }
      .hero__facts {
        display: grid;
        gap: 8px;
        font-size: 11px;
        color: var(--muted);
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-14px);
        }
      }
      .hero__scroll {
        position: absolute;
        bottom: 26px;
        left: 50%;
        transform: translateX(-50%);
        background: none;
        border: none;
        color: var(--ink);
        font-size: 18px;
        cursor: pointer;
        z-index: 3;
        animation: bob 2s ease-in-out infinite;
      }
      @keyframes bob {
        0%,
        100% {
          transform: translate(-50%, 0);
        }
        50% {
          transform: translate(-50%, 6px);
        }
      }
      .hud-clock {
        position: absolute;
        bottom: 28px;
        left: max(4vw, 18px);
        font-size: 18px;
        color: var(--ink);
        z-index: 3;
      }
      .hud-clock__dot {
        color: var(--accent-bright);
        animation: blink 1.4s steps(1) infinite;
      }
      .sprite {
        position: absolute;
        z-index: 1;
        color: var(--accent);
        opacity: 0.5;
        animation: float 6s ease-in-out infinite;
        user-select: none;
      }
      .sprite--1 {
        top: 18%;
        left: 8%;
        font-size: 22px;
        animation-delay: 0.2s;
      }
      .sprite--2 {
        top: 70%;
        left: 14%;
        font-size: 16px;
        animation-delay: 1.1s;
      }
      .sprite--3 {
        top: 30%;
        right: 10%;
        font-size: 26px;
        animation-delay: 0.6s;
      }
      .sprite--4 {
        top: 80%;
        right: 18%;
        font-size: 18px;
        animation-delay: 1.6s;
      }

      .app {
        position: relative;
        background:
          radial-gradient(circle at var(--mx) var(--my), rgba(255, 255, 255, 0.2) 0, transparent 210px),
          radial-gradient(90vw 70vw at 8% 12%, rgba(255, 143, 180, 0.35), transparent 58%),
          radial-gradient(70vw 56vw at 92% 28%, rgba(168, 83, 111, 0.45), transparent 62%),
          linear-gradient(180deg, #ef9bb6 0%, #a8536f 42%, #190d12 100%);
        overflow: hidden;
      }
      .app::before {
        content: "";
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 170px;
        background:
          radial-gradient(circle at var(--mx) var(--my), rgba(255, 255, 255, 0.18) 0, transparent 210px),
          linear-gradient(135deg, var(--accent), var(--accent-deep));
        clip-path: polygon(
          0 24%, 5% 34%, 10% 16%, 16% 34%, 22% 20%, 29% 32%,
          36% 18%, 44% 30%, 52% 17%, 61% 33%, 70% 21%,
          79% 34%, 88% 15%, 100% 38%, 100% 100%, 0 100%
        );
        pointer-events: none;
        z-index: 0;
      }
      .app::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(var(--grid) 1px, transparent 1px),
          linear-gradient(90deg, var(--grid) 1px, transparent 1px);
        background-size: 22px 22px;
        mask-image: radial-gradient(circle at var(--mx) var(--my), black 0 360px, rgba(0, 0, 0, 0.38) 560px, transparent 900px);
        opacity: 0.55;
        pointer-events: none;
        z-index: 0;
      }
      .app > * {
        position: relative;
        z-index: 1;
      }

      /* ============ BUTTONS ============ */
      .btn {
        display: inline-block;
        font-size: 13px;
        padding: 10px 18px;
        border: 2px solid var(--ink);
        font-weight: 700;
        text-transform: lowercase;
        transition:
          transform 0.2s,
          background 0.2s,
          color 0.2s;
      }
      .btn--solid {
        background: var(--accent);
        color: var(--ink);
      }
      .btn--solid:hover {
        background: var(--bg2);
      }
      .btn--ghost {
        border: 2px solid var(--ink);
        color: var(--ink);
      }
      .btn--ghost:hover {
        background: var(--accent);
      }
      .magnetic {
        display: inline-block;
        transition: transform 0.15s ease-out;
      }

      /* ============ SOCIAL ============ */
      .social {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .social__btn {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        padding: 8px 10px;
        border: 2px solid var(--ink);
        color: var(--ink);
        background: var(--bg2);
        transition:
          border-color 0.2s,
          color 0.2s,
          transform 0.2s,
          background 0.2s;
      }
      .social__btn:hover {
        border-color: var(--ink);
        color: var(--ink);
        transform: translateY(-2px);
        background: var(--accent);
      }
      .social__icon {
        display: inline-flex;
      }
      .social__lbl {
        font-family: "Space Mono", monospace;
        font-size: 12px;
      }
      .social--c .social__btn {
        padding: 9px;
      }

      /* ============ SECTION BAR ============ */
      .sec {
        position: relative;
        padding: 88px clamp(18px, 4vw, 54px);
        background:
          linear-gradient(135deg, rgba(25, 13, 18, 0.94), rgba(18, 10, 14, 0.86)),
          var(--panel);
        border: 2px solid var(--ink);
        margin: 54px auto;
        box-shadow: 12px 12px 0 var(--accent-deep);
        backdrop-filter: blur(10px);
      }
      .app > .sec:nth-of-type(1) {
        width: min(1260px, 94vw);
        margin-left: max(3vw, 18px);
        margin-right: auto;
        border-color: var(--accent);
      }
      .app > .sec:nth-of-type(2) {
        width: min(980px, 84vw);
        margin-left: auto;
        margin-right: max(5vw, 24px);
        background:
          linear-gradient(180deg, rgba(11, 6, 8, 0.78), rgba(25, 13, 18, 0.94)),
          var(--panel);
        box-shadow: -12px 12px 0 var(--accent-deep);
      }
      .app > .sec:nth-of-type(3) {
        width: min(1320px, 96vw);
        margin-left: auto;
        margin-right: auto;
        padding-top: 112px;
        background:
          radial-gradient(42vw 24vw at 50% 0%, rgba(239, 155, 182, 0.18), transparent 70%),
          linear-gradient(135deg, rgba(18, 10, 14, 0.9), rgba(11, 6, 8, 0.82));
      }
      .app > .sec:nth-of-type(4) {
        width: min(1040px, 86vw);
        margin-left: max(8vw, 30px);
        margin-right: auto;
        border-color: var(--accent-bright);
        background:
          linear-gradient(90deg, rgba(168, 83, 111, 0.18), rgba(25, 13, 18, 0.94)),
          var(--panel);
      }
      .sec::before {
        content: "+";
        position: absolute;
        top: 18px;
        right: 22px;
        color: var(--accent);
        font-family: "Space Mono", monospace;
        font-size: 34px;
        line-height: 1;
      }
      .app > .sec:nth-of-type(2)::before {
        left: 22px;
        right: auto;
      }
      .app > .sec:nth-of-type(3)::before {
        content: "////";
        font-size: 22px;
      }
      .app > .sec:nth-of-type(2) .bar {
        justify-content: flex-end;
        text-align: right;
      }
      .app > .sec:nth-of-type(2) .bar__rule {
        order: -1;
        background: linear-gradient(90deg, transparent, var(--ink));
      }
      .app > .sec:nth-of-type(3) .bar {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: end;
      }
      .app > .sec:nth-of-type(3) .bar__t {
        grid-column: 1 / -1;
        font-size: clamp(54px, 10vw, 140px);
      }
      .app > .sec:nth-of-type(4) .bar__t {
        white-space: normal;
      }
      .bar {
        display: flex;
        align-items: baseline;
        gap: 16px;
        margin-bottom: 46px;
      }
      .bar__n {
        font-size: 12px;
        color: var(--ink);
      }
      .bar__t {
        font-family: "Space Mono", monospace;
        font-style: normal;
        font-weight: 700;
        font-size: clamp(42px, 8vw, 112px);
        color: var(--ink);
        line-height: 0.85;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .bar__rule {
        flex: 1;
        height: 2px;
        background: var(--ink);
        align-self: center;
      }

      /* ============ ABOUT ============ */
      .about {
        display: grid;
        grid-template-columns: minmax(180px, 280px) minmax(0, 1fr);
        gap: clamp(26px, 4vw, 56px);
        align-items: start;
      }
      .about__photo {
        position: relative;
        aspect-ratio: 3/4;
        overflow: hidden;
        border: 2px solid var(--ink);
        background: var(--accent);
      }
      .about__dither,
      .about__real {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .about__real {
        opacity: 0;
        transition: opacity 0.4s ease;
        filter: saturate(0.9) contrast(1.02);
      }
      .about__real.is-on {
        opacity: 1;
      }
      .about__photolbl {
        position: absolute;
        bottom: 10px;
        left: 10px;
        font-size: 16px;
        color: var(--ink);
        background: var(--accent);
        padding: 2px 8px;
        border: 1px solid var(--ink);
      }
      .about__body {
        display: flex;
        flex-direction: column;
        gap: 22px;
        width: min(760px, 100%);
      }
      .about__text p {
        margin-bottom: 10px;
        font-size: clamp(14px, 1.05vw, 16px);
        line-height: 1.5;
        text-transform: uppercase;
      }
      .about__meta {
        display: grid;
        grid-template-columns: 1fr;
        gap: 14px;
      }
      .metacard {
        border: 2px solid var(--ink);
        padding: 14px 16px;
        background: var(--bg2);
      }
      .metacard--education {
        padding: clamp(16px, 2.2vw, 24px);
        background:
          radial-gradient(38vw 18vw at 100% 0%, rgba(239, 155, 182, 0.12), transparent 72%),
          var(--bg2);
      }
      .metacard__k {
        display: block;
        font-size: 13px;
        color: var(--ink);
        text-transform: uppercase;
        margin-bottom: 6px;
      }
      .metacard__v {
        font-family: "Space Mono", monospace;
        font-style: normal;
        font-size: clamp(17px, 1.8vw, 24px);
        font-weight: 700;
        color: var(--ink);
        line-height: 1.05;
        text-transform: uppercase;
      }
      .metacard__sub {
        display: block;
        font-size: 13px;
        color: var(--muted);
        margin-top: 8px;
      }
      .metacard__focus {
        margin-top: 18px;
        max-width: 620px;
        color: var(--ink);
        font-size: 16px;
        text-transform: uppercase;
      }
      .stack__lbl {
        display: block;
        font-size: 14px;
        color: var(--ink);
        margin-bottom: 12px;
      }
      .stack__chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      .chip {
        font-size: 17px;
        padding: 3px 10px;
        border: 2px solid var(--ink);
        color: var(--ink);
        background: var(--accent);
        transition:
          border-color 0.2s,
          color 0.2s,
          transform 0.2s;
      }
      .chip:hover {
        border-color: var(--ink);
        color: var(--ink);
        transform: translateY(-1px);
      }
      .techchip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        padding: 0;
        background: color-mix(in srgb, var(--bg) 78%, transparent);
        border-color: var(--line);
      }
      .techchip img {
        width: 22px;
        height: 22px;
        display: block;
      }

      /* ============ EXPERIENCE ============ */
      .explist {
        display: grid;
        grid-template-columns: 1fr;
        gap: 24px;
      }
      .exp {
        display: grid;
        grid-template-columns: 28px 1fr;
        gap: 18px;
      }
      .exp__rail {
        display: flex;
        justify-content: center;
        position: relative;
      }
      .exp__rail::before {
        content: "";
        position: absolute;
        top: 8px;
        bottom: -26px;
        width: 2px;
        background: var(--ink);
      }
      .exp:last-child .exp__rail::before {
        display: none;
      }
      .exp__dot {
        width: 12px;
        height: 12px;
        margin-top: 6px;
        border: 2px solid var(--ink);
        background: var(--bg2);
        position: relative;
        z-index: 1;
      }
      .exp__dot--now {
        background: var(--accent);
        box-shadow: 4px 4px 0 var(--accent-deep);
      }
      .exp__card {
        border: 2px solid var(--ink);
        background: var(--bg2);
        padding: 18px 20px;
        transition: border-color 0.25s;
      }
      .exp.is-open .exp__card,
      .exp__card:hover {
        border-color: var(--ink);
        box-shadow: 7px 7px 0 var(--accent);
      }
      .exp__head {
        width: 100%;
        background: none;
        border: none;
        color: inherit;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        cursor: pointer;
        text-align: left;
      }
      .exp__period {
        font-size: 12px;
        color: var(--ink);
        text-transform: uppercase;
      }
      .exp__company {
        font-family: "Space Mono", monospace;
        font-style: normal;
        font-weight: 600;
        font-size: 28px;
        color: var(--ink);
        margin: 2px 0;
        text-transform: uppercase;
      }
      .exp__role {
        font-size: 13px;
        color: var(--muted);
        text-transform: uppercase;
      }
      .exp__toggle {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        font-size: 26px;
        color: var(--accent);
        line-height: 1;
        transition:
          transform 0.28s ease,
          color 0.2s ease;
        transform-origin: center;
      }
      .exp__toggle::before {
        content: "+";
      }
      .exp__toggle {
        font-size: 0;
      }
      .exp.is-open .exp__toggle {
        transform: rotate(180deg);
        color: var(--accent-bright);
      }
      .exp.is-open .exp__toggle::before {
        content: "-";
        font-size: 26px;
      }
      .exp__toggle::before {
        font-size: 26px;
      }
      .exp__summary {
        font-size: 15px;
        color: var(--ink);
        margin-top: 8px;
      }
      .exp__detail {
        overflow: hidden;
        transition: max-height 0.45s ease;
      }
      .exp__bullets {
        list-style: none;
        margin: 16px 0 0;
        padding: 0;
      }
      .exp__bullets li {
        position: relative;
        padding-left: 22px;
        margin-bottom: 10px;
        font-size: 14px;
        color: var(--ink);
      }
      .exp__bullets li::before {
        content: "↳";
        position: absolute;
        left: 0;
        color: var(--accent-deep);
      }
      .exp__tags {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        margin-top: 16px;
      }
      .tag {
        font-size: 12px;
        padding: 2px 9px;
        border: 2px solid var(--ink);
        color: var(--ink);
        background: var(--bg2);
      }

      /* ============ PROJECTS ============ */
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: clamp(14px, 2vw, 28px);
      }
      .card:nth-child(2) {
        margin-top: 70px;
      }
      .card:nth-child(3) {
        margin-top: 34px;
      }
      .card:nth-child(4) {
        margin-top: 92px;
      }
      .card {
        display: flex;
        flex-direction: column;
        background: var(--bg2);
        border: 2px solid var(--ink);
        overflow: hidden;
        transition:
          border-color 0.25s,
          transform 0.25s,
          box-shadow 0.25s;
      }
      .card:hover {
        border-color: var(--ink);
        transform: translateY(-4px);
        box-shadow: 8px 8px 0 var(--accent);
      }
      .card__cover {
        position: relative;
        height: 150px;
        overflow: hidden;
        border-bottom: 2px solid var(--ink);
      }
      .card__cover .dither {
        height: 100%;
        transition: transform 0.5s ease;
      }
      .card:hover .card__cover .dither {
        transform: scale(1.06);
      }
      .card__kind {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 11px;
        color: var(--ink);
        background: var(--accent);
        padding: 2px 8px;
        border: 1px solid var(--ink);
      }
      .card__year {
        position: absolute;
        top: 10px;
        right: 10px;
        font-size: 11px;
        color: var(--ink);
        background: var(--bg2);
        padding: 2px 8px;
        border: 1px solid var(--ink);
      }
      .card__body {
        padding: 16px 16px 18px;
      }
      .card__name {
        font-family: "Space Mono", monospace;
        font-style: normal;
        font-weight: 600;
        font-size: 22px;
        color: var(--ink);
        margin-bottom: 6px;
        line-height: 1;
        text-transform: uppercase;
      }
      .card__tag {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 14px;
        line-height: 1.35;
      }
      .card__open {
        font-size: 12px;
        color: var(--ink);
      }

      /* ============ CONTACT ============ */
      .contact {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(220px, 360px);
        gap: clamp(30px, 6vw, 76px);
        align-items: start;
      }
      .contact__lead {
        font-family: "Space Mono", monospace;
        font-style: normal;
        font-size: clamp(28px, 5vw, 64px);
        color: var(--ink);
        line-height: 0.95;
        margin-bottom: 26px;
        text-transform: uppercase;
      }
      .contact__direct {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-bottom: 22px;
        font-size: 14px;
      }
      .contact__form {
        display: grid;
        gap: 12px;
        margin: 0 0 22px;
        max-width: 620px;
      }
      .contact__form label {
        display: grid;
        gap: 6px;
      }
      .contact__form label span {
        font-size: 12px;
        color: var(--accent);
        text-transform: uppercase;
      }
      .contact__form input,
      .contact__form textarea {
        width: 100%;
        border: 2px solid var(--ink);
        background: color-mix(in srgb, var(--bg) 82%, transparent);
        color: var(--ink);
        font: 15px/1.4 "Helvetica", Helvetica, sans-serif;
        padding: 11px 12px;
        outline: none;
      }
      .contact__form input::placeholder,
      .contact__form textarea::placeholder {
        color: color-mix(in srgb, var(--muted) 75%, transparent);
      }
      .contact__form textarea {
        resize: vertical;
        min-height: 130px;
      }
      .contact__form input:focus,
      .contact__form textarea:focus {
        border-color: var(--accent-bright);
        box-shadow: 0 0 0 3px var(--soft);
      }
      .contact__form button {
        justify-self: start;
      }
      .contact__right {
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
      }
      .contact__line {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--ink);
        transition: color 0.2s;
      }
      a.contact__line:hover {
        color: var(--accent);
      }
      .contact__ic {
        color: var(--ink);
      }
      .contact__art {
        width: min(360px, 100%);
        display: block;
        margin-left: auto;
        border: 0;
        filter: none;
        background: transparent;
        mix-blend-mode: normal;
      }

      /* ============ FOOTER ============ */
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 12px;
        font-size: 18px;
        color: var(--muted);
        padding: 40px 0 60px;
        border-top: 2px solid var(--ink);
        margin-top: 30px;
      }
      .footer__top {
        background: none;
        border: none;
        color: var(--ink);
        font-family: "Space Mono", monospace;
        font-size: 18px;
        cursor: pointer;
      }

      /* ============ PROJECT PAGE ============ */
      .pp {
        padding-top: 76px;
        min-height: 100vh;
      }
      .pp__hero {
        position: relative;
        height: 52vh;
        min-height: 360px;
        overflow: hidden;
        border-bottom: 2px solid var(--ink);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding-bottom: 36px;
      }
      .pp__herodither {
        position: absolute;
        inset: 0;
        height: 100%;
      }
      .pp__heroveil {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, var(--bg) 6%, transparent 70%);
      }
      .pp__herotop {
        position: absolute;
        top: 22px;
        left: 0;
        right: 0;
        display: flex;
        justify-content: space-between;
        font-size: 19px;
        color: var(--ink);
        z-index: 2;
      }
      .pp__back {
        background: none;
        border: none;
        color: var(--ink);
        font-family: "Space Mono", monospace;
        font-size: 19px;
        cursor: pointer;
      }
      .pp__herotitle {
        position: relative;
        z-index: 2;
      }
      .pp__name {
        font-family: "Space Mono", monospace;
        font-style: normal;
        font-weight: 700;
        font-size: clamp(52px, 9vw, 110px);
        color: var(--ink);
        line-height: 0.95;
        text-transform: uppercase;
      }
      .pp__tagline {
        font-size: 22px;
        color: var(--ink);
        font-style: normal;
        font-family: "Space Mono", monospace;
        margin-top: 6px;
      }
      .pp__body {
        display: grid;
        grid-template-columns: 1.5fr 0.8fr;
        gap: 50px;
        padding: 60px 0;
        align-items: start;
      }
      .pp__block {
        margin-bottom: 38px;
      }
      .pp__klbl {
        display: block;
        font-size: 18px;
        color: var(--ink);
        margin-bottom: 12px;
      }
      .pp__lead {
        font-size: 22px;
        color: var(--ink);
      }
      .pp__main p {
        font-size: 20px;
      }
      .pp__features {
        list-style: none;
      }
      .pp__features li {
        display: flex;
        align-items: baseline;
        gap: 14px;
        padding: 12px 0;
        border-bottom: 2px solid var(--ink);
        font-size: 20px;
      }
      .pp__fnum {
        color: var(--ink);
        font-size: 17px;
      }
      .pp__side {
        display: flex;
        flex-direction: column;
        gap: 22px;
        position: sticky;
        top: 90px;
      }
      .pp__panel {
        border: 2px solid var(--ink);
        background: var(--bg2);
        padding: 18px 20px;
      }
      .pp__status {
        font-size: 19px;
        color: var(--ink);
      }
      .pp__visit {
        width: 100%;
        text-align: center;
      }
      .pp__note {
        display: block;
        text-align: center;
        font-size: 16px;
        color: var(--muted);
      }
      .pp__next {
        padding: 50px 0 80px;
        border-top: 2px solid var(--ink);
        text-align: right;
      }
      .pp__nextlbl {
        font-size: 19px;
        color: var(--ink);
      }
      .pp__nextname {
        font-family: "Space Mono", monospace;
        font-style: normal;
        font-weight: 700;
        font-size: clamp(44px, 7vw, 84px);
        color: var(--ink);
        text-transform: uppercase;
        transition: color 0.25s;
      }
      .pp__next:hover .pp__nextname {
        color: var(--accent);
      }

      /* ============ TYPEWRITER + GLITCH ============ */
      .tw-caret {
        color: var(--accent-bright);
        animation: blink 0.8s steps(1) infinite;
      }
      .glitch {
        position: relative;
        display: inline-block;
      }
      .glitch[data-text]::before,
      .glitch[data-text]::after {
        content: attr(data-text);
        position: absolute;
        inset: 0;
        opacity: 0;
        pointer-events: none;
      }
      .glitch[data-text]:hover::before {
        opacity: 0.85;
        color: var(--accent-bright);
        animation: gl1 0.4s steps(2) infinite;
        left: 2px;
      }
      .glitch[data-text]:hover::after {
        opacity: 0.7;
        color: var(--accent-deep);
        animation: gl2 0.4s steps(2) infinite;
        left: -2px;
      }
      @keyframes gl1 {
        0% {
          clip-path: inset(0 0 70% 0);
        }
        50% {
          clip-path: inset(40% 0 20% 0);
        }
        100% {
          clip-path: inset(60% 0 0 0);
        }
      }
      @keyframes gl2 {
        0% {
          clip-path: inset(70% 0 0 0);
        }
        50% {
          clip-path: inset(20% 0 50% 0);
        }
        100% {
          clip-path: inset(0 0 80% 0);
        }
      }

      /* ============ RESPONSIVE ============ */
      @media (max-width: 880px) {
        .nav__links {
          display: none;
        }
        .hero__grid {
          grid-template-columns: 1fr;
          gap: 30px;
          min-height: auto;
          padding-top: 92px;
          box-shadow: none;
        }
        .hero__miniNav {
          flex-wrap: wrap;
          justify-content: center;
          top: 18px;
          left: 18px;
          right: 18px;
        }
        .hero__aside {
          position: static;
          width: min(420px, 100%);
          margin: 24px auto 0;
          border-top: 2px solid var(--ink);
          padding-top: 18px;
          text-align: center;
        }
        .app > .sec:nth-of-type(n) {
          width: min(100% - 36px, 1180px);
          margin-left: auto;
          margin-right: auto;
        }
        .about {
          grid-template-columns: 1fr;
          gap: 28px;
        }
        .about__photo {
          width: min(320px, 78vw);
          max-width: none;
          margin: 0 auto;
        }
        .about__body {
          width: 100%;
          gap: 20px;
        }
        .about__text p {
          font-size: 14px;
          line-height: 1.55;
        }
        .metacard__v {
          font-size: clamp(16px, 5vw, 22px);
          overflow-wrap: anywhere;
        }
        .stack__chips {
          gap: 10px;
        }
        .techchip {
          width: 40px;
          height: 40px;
        }
        .techchip img {
          width: 21px;
          height: 21px;
        }
        .explist {
          gap: 18px;
        }
        .exp {
          grid-template-columns: 18px minmax(0, 1fr);
          gap: 12px;
        }
        .exp__card {
          padding: 16px;
        }
        .exp__head {
          gap: 12px;
          align-items: flex-start;
        }
        .exp__company {
          font-size: clamp(20px, 6vw, 26px);
          overflow-wrap: anywhere;
        }
        .exp__role,
        .exp__summary,
        .exp__bullets li {
          font-size: 13px;
        }
        .exp__detail {
          max-width: 100%;
        }
        .grid {
          grid-template-columns: repeat(2, 1fr);
        }
        .card:nth-child(n) {
          margin-top: 0;
        }
        .contact {
          grid-template-columns: 1fr;
        }
        .contact__right {
          justify-content: center;
        }
        .pp__body {
          grid-template-columns: 1fr;
        }
        .pp__side {
          position: static;
        }
        .about__meta {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 520px) {
        body {
          font-size: 17px;
        }
        .wrap {
          width: min(100% - 28px, 1180px);
        }
        .hero {
          padding-top: 88px;
        }
        .hero__grid {
          padding: 96px 18px 34px;
        }
        .hero__left {
          min-height: auto;
        }
        .hero__name {
          max-width: 100%;
          width: 100%;
          line-height: 0.86;
        }
        .hero__nameline {
          font-size: clamp(42px, 16.5vw, 72px);
        }
        .hero__nameline--2 {
          width: min-content;
          margin: 0 auto;
          white-space: normal;
          font-size: clamp(48px, 16vw, 68px);
          line-height: 0.82;
        }
        .hero__role::before {
          font-size: 20px;
        }
        .hero__tech {
          display: none;
        }
        .bar {
          align-items: flex-start;
        }
        .bar__t {
          white-space: normal;
          font-size: clamp(36px, 16vw, 64px);
        }
        #experiencia .bar {
          display: grid;
          grid-template-columns: auto minmax(0, 1fr);
          gap: 8px 12px;
          margin-bottom: 28px;
        }
        #experiencia .bar__t {
          grid-column: 1 / -1;
          font-size: clamp(34px, 11vw, 46px);
          line-height: 0.95;
          max-width: 100%;
          overflow-wrap: anywhere;
        }
        #experiencia .bar__rule {
          min-width: 0;
        }
        .grid {
          grid-template-columns: 1fr;
        }
        .about {
          gap: 20px;
        }
        .about__photo {
          width: min(220px, 72vw);
        }
        .about__text p {
          font-size: 13px;
        }
        .metacard--education {
          padding: 14px;
        }
        .metacard__sub {
          font-size: 12px;
          overflow-wrap: anywhere;
        }
        .stack__lbl {
          font-size: 13px;
        }
        .techchip {
          width: 38px;
          height: 38px;
        }
        .techchip img {
          width: 20px;
          height: 20px;
        }
        .exp {
          grid-template-columns: 1fr;
        }
        .exp__rail {
          display: none;
        }
        .exp__card {
          padding: 14px;
        }
        .exp__company {
          font-size: 20px;
        }
        .exp__summary,
        .exp__bullets li {
          font-size: 13px;
        }
        .exp__bullets li {
          padding-left: 16px;
        }
        .exp__bullets li::before {
          left: 0;
        }
        .exp__tags {
          gap: 6px;
        }
        .exp__tags .tag {
          font-size: 10px;
          padding: 2px 7px;
        }
        .sec {
          padding: 42px 18px;
          box-shadow: 7px 7px 0 var(--accent-deep);
        }
        .boot__inner {
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
